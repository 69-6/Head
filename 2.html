<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ethical — فوق الراس</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14101f; --bg2:#0e0b16; --surface:#1d1730; --surface2:#251d3d;
    --line:#332a4d; --violet:#8b5cf6; --violet-soft:#a78bfa; --magenta:#d946ef;
    --red:#f43f5e; --text:#ece8f5; --muted:#9a8fb8; --ok:#34d399; --gold:#facc15;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;
    background:radial-gradient(900px 600px at 80% -10%,rgba(139,92,246,.18),transparent 60%),
    radial-gradient(700px 500px at 0% 110%,rgba(217,70,239,.12),transparent 55%),var(--bg);}
  .particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .particles span{position:absolute;width:5px;height:5px;border-radius:50%;background:radial-gradient(circle,var(--violet-soft),transparent 70%);opacity:.4;animation:drift linear infinite}
  @keyframes drift{from{transform:translateY(110vh) scale(.6)}to{transform:translateY(-10vh) scale(1.2)}}
  .wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:26px 18px 56px}
  .brand{display:flex;flex-direction:column;align-items:center;text-align:center;margin:16px 0 22px}
  .mark{font-family:"Space Grotesk";font-weight:700;letter-spacing:.18em;font-size:13px;color:var(--violet-soft);
    text-transform:lowercase;border:1px solid var(--line);padding:6px 14px;border-radius:999px;background:rgba(139,92,246,.06)}
  .mark::before{content:"// "}
  h1{font-family:"Cairo";font-weight:900;font-size:clamp(32px,10vw,48px);margin:13px 0 4px;line-height:1;
    background:linear-gradient(120deg,#fff,var(--violet-soft) 55%,var(--magenta));-webkit-background-clip:text;background-clip:text;color:transparent}
  .card{background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--line);border-radius:22px;padding:20px;margin-bottom:16px;box-shadow:0 18px 40px -24px rgba(0,0,0,.8)}
  .label{font-weight:700;font-size:15px;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .label .dot{width:7px;height:7px;border-radius:50%;background:var(--violet);box-shadow:0 0 10px var(--violet)}
  .name-input{display:flex;gap:9px}
  .name-input input{flex:1;background:var(--surface2);border:1px solid var(--line);border-radius:13px;padding:14px;color:var(--text);font-family:inherit;font-size:16px;outline:none}
  .name-input input:focus{border-color:var(--violet)}
  .add-btn{flex:none;width:52px;border-radius:13px;border:none;font-size:26px;font-weight:700;color:#fff;cursor:pointer;background:linear-gradient(120deg,var(--violet),var(--magenta))}
  .add-btn:active{transform:scale(.94)}
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px}
  .pill{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:8px 11px;font-size:14px;font-weight:600}
  .pill b{font-family:"Space Grotesk";color:var(--violet-soft);font-size:12px}
  .pill .x{cursor:pointer;color:var(--muted);font-weight:700;font-size:17px;line-height:1}
  .pill .up{cursor:pointer;color:var(--violet-soft);font-weight:700;font-size:12px;border:1px solid var(--line);border-radius:8px;padding:3px 7px}
  .empty{color:var(--muted);font-size:13px;margin-top:11px}
  .go{width:100%;border:none;border-radius:18px;padding:18px;font-family:"Cairo";font-weight:800;font-size:18px;color:#fff;cursor:pointer;background:linear-gradient(120deg,var(--violet),var(--magenta));box-shadow:0 16px 34px -14px var(--violet);transition:.15s}
  .go:active{transform:translateY(2px)}
  .go:disabled{opacity:.4;box-shadow:none}
  .go.sec{background:var(--surface2);border:1px solid var(--line);box-shadow:none;font-size:16px;padding:15px;color:var(--text)}
  .linkbox{background:var(--surface2);border:1px dashed var(--violet);border-radius:14px;padding:13px;font-size:12px;direction:ltr;text-align:left;word-break:break-all;color:var(--violet-soft);margin:12px 0;max-height:90px;overflow:auto}
  .hint{color:var(--muted);font-size:13px;line-height:1.7;margin-top:4px}
  .hint b{color:var(--violet-soft)}
  .steps{counter-reset:s;list-style:none;padding:0;margin:0}
  .steps li{counter-increment:s;position:relative;padding:8px 34px 8px 0;color:var(--muted);font-size:13.5px;line-height:1.6}
  .steps li::before{content:counter(s);position:absolute;right:0;top:7px;width:22px;height:22px;border-radius:7px;background:rgba(139,92,246,.15);color:var(--violet-soft);font-family:"Space Grotesk";font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center}
  .pin{width:100%;text-align:center;letter-spacing:.5em;font-family:"Space Grotesk";font-size:24px;background:var(--surface2);border:1px solid var(--line);border-radius:13px;padding:14px;color:var(--text);outline:none}
  .pin:focus{border-color:var(--violet)}
  .pinerr{color:#ffb3c0;font-size:13px;text-align:center;min-height:18px;margin:8px 0}
  /* photo grids */
  .photo-btn{width:100%;border:1px dashed var(--violet);background:rgba(139,92,246,.06);color:var(--violet-soft);border-radius:16px;padding:16px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;margin-bottom:12px}
  .thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:6px}
  .thumb{position:relative;aspect-ratio:1;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:var(--surface2)}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .st{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(14,11,22,.55)}
  .thumb .rm{position:absolute;top:4px;left:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}
  .pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:6px}
  .pcard{border:1px solid var(--line);border-radius:16px;padding:10px;text-align:center;background:var(--surface2)}
  .pcard img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:11px;display:block}
  .pcard .pn{font-weight:700;font-size:13px;margin-top:7px}
  .pcard.empty{color:var(--muted);font-size:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;aspect-ratio:1}
  /* role/board view */
  .role-stage{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:30px 18px 50px;text-align:center;position:relative;z-index:1}
  .pick-title{font-family:"Cairo";font-weight:800;font-size:24px;margin-bottom:6px}
  .pick-sub{color:var(--muted);font-size:14px;margin-bottom:24px}
  .names-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;width:min(420px,90vw)}
  .name-btn{padding:18px 12px;border-radius:16px;border:1px solid var(--line);background:linear-gradient(180deg,var(--surface),var(--bg2));color:var(--text);font-family:inherit;font-weight:700;font-size:16px;cursor:pointer;transition:.15s}
  .name-btn:active{transform:scale(.96);border-color:var(--violet)}
  .ctl{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .ctl button{border:1px solid var(--line);background:var(--surface2);color:var(--text);padding:12px 18px;border-radius:13px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer}
  .ctl .upd{background:linear-gradient(120deg,var(--violet),var(--magenta));border:none;color:#fff}
  .badlink{color:var(--muted);font-size:15px;line-height:1.8}
  .board-title{font-family:"Cairo";font-weight:800;font-size:22px;margin-bottom:4px}
  .board-sub{color:var(--muted);font-size:13.5px;margin-bottom:18px;max-width:340px}
  .board{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:min(460px,92vw)}
  .bcard{border-radius:20px;padding:12px;text-align:center;border:1px solid var(--line);background:linear-gradient(180deg,var(--surface),var(--bg2));box-shadow:0 18px 34px -22px rgba(0,0,0,.8)}
  .bcard img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:14px;display:block;background:var(--surface2)}
  .bcard .bn{font-weight:700;font-size:14px;margin-top:8px}
  .bcard.me{border:1px dashed var(--violet);background:rgba(139,92,246,.06)}
  .bcard.me .mask{width:100%;aspect-ratio:1;border-radius:14px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:38px}
  .bcard.won{border-color:var(--gold);background:rgba(250,204,21,.08);animation:winpop .5s ease}
  .bcard.won .bn{color:var(--gold)}
  @keyframes winpop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
  .guess-btn{margin-top:8px;width:100%;border:none;border-radius:11px;padding:9px;font-family:inherit;font-weight:700;font-size:12.5px;color:#fff;cursor:pointer;background:linear-gradient(120deg,var(--violet),var(--magenta))}
  .flash{animation:flash 1s ease}
  @keyframes flash{0%{box-shadow:0 0 0 0 var(--violet)}50%{box-shadow:0 0 0 4px var(--violet)}100%{box-shadow:none}}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--line);color:var(--text);padding:12px 18px;border-radius:13px;font-size:14px;z-index:50;opacity:0;transition:.3s}
  .toast.show{opacity:1}
  @media (prefers-reduced-motion: reduce){.particles{display:none}*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="wrap" id="hostView"></div>
<div class="role-stage" id="roleView" style="display:none"></div>
<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="image/*" multiple style="display:none">
<input type="file" id="fileInputOne" accept="image/*" style="display:none">

<script>
/* ============ obfuscation ============ */
const KEY="ethical-headsup-2026";
function xorStr(s){let o="";for(let i=0;i<s.length;i++)o+=String.fromCharCode(s.charCodeAt(i)^KEY.charCodeAt(i%KEY.length));return o;}
function enc(o){return btoa(unescape(encodeURIComponent(xorStr(JSON.stringify(o))))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
function dec(t){let b=t.replace(/-/g,'+').replace(/_/g,'/');while(b.length%4)b+='=';return JSON.parse(xorStr(decodeURIComponent(escape(atob(b)))));}

/* ============ realtime store (ntfy.sh) ============ */
function topic(code){return 'ethical-heads-'+code;}
async function pushTo(code,state){
  state.ts=Date.now();
  try{ await fetch('https://ntfy.sh/'+topic(code),{method:'POST',body:enc(state)}); }catch(e){ toast('تعذّر الاتصال بالإنترنت'); }
}
async function pullFrom(code){
  try{
    const r=await fetch('https://ntfy.sh/'+topic(code)+'/json?poll=1&since=12h');
    const txt=await r.text();
    let best=null,bestTs=-1;
    txt.trim().split('\n').filter(Boolean).forEach(ln=>{
      let o;try{o=JSON.parse(ln);}catch(e){return;}
      if(o.event!=='message'||!o.message)return;
      let s;try{s=dec(o.message);}catch(e){return;}
      if(s&&s.ts>bestTs){bestTs=s.ts;best=s;}
    });
    return best;
  }catch(e){return null;}
}
/* image upload as ntfy attachment (expires ~3h on ntfy.sh) */
async function compressImage(file,maxDim=720,quality=0.72){
  const dataUrl=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});
  const img=await new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=dataUrl;});
  let w=img.width,h=img.height;
  if(w>h){ if(w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;} } else { if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;} }
  const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
  canvas.getContext('2d').drawImage(img,0,0,w,h);
  return await new Promise(res=>canvas.toBlob(res,'image/jpeg',quality));
}
async function uploadImage(blob,code,idx){
  const resp=await fetch('https://ntfy.sh/'+code+'-img',{method:'PUT',body:blob,headers:{'Filename':'p'+idx+'-'+Date.now()+'.jpg'}});
  const data=await resp.json();
  return data.attachment && data.attachment.url;
}

/* ============ helpers ============ */
const $=id=>document.getElementById(id);
function rndInt(n){return Math.floor(Math.random()*n);}
function rndCode(){let s="";const a="abcdefghijkmnpqrstuvwxyz23456789";for(let i=0;i<6;i++)s+=a[rndInt(a.length)];return s;}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=rndInt(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return (''+s).replace(/'/g,"\\'");}
function toEN(s){return (''+s).replace(/[\u0660-\u0669]/g,d=>d.charCodeAt(0)-0x0660).replace(/[\u06F0-\u06F9]/g,d=>d.charCodeAt(0)-0x06F0).replace(/[^0-9]/g,'');}
function pinHash(pin,salt){let h=2166136261>>>0;const s=(salt||'')+':'+pin+':eth';for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)>>>0;}return ('0000000'+h.toString(16)).slice(-8);}
let toastT;function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}
function shareLink(code){return location.href.split('#')[0]+'#room='+code;}
const MAXP=4, MINP=2;

/* ============ HOST ============ */
let P={players:[],chars:{},pins:{},v:0,ts:0};
let roomCode=rndCode(); // stable code from the moment the page loads; used for image uploads even before room is officially "created"
let roomCreated=false, pushTimer=null;
let pool=[]; // {status:'uploading'|'done'|'error', preview, url}
let pendingUploadFor=null; // name waiting for a single new photo (added mid-game)

function pushSoon(){clearTimeout(pushTimer);pushTimer=setTimeout(()=>pushTo(roomCode,P),500);}
function readyPool(){return pool.filter(p=>p.status==='done');}

function renderHost(){
  const hasFullAssign=P.players.length>0 && P.players.every(n=>P.chars[n]);
  const needCount=P.players.length;

  let pills=P.players.map((n,i)=>{
    const lock=P.pins[n]?`<span class="x" title="إعادة الرمز" style="color:var(--violet-soft)" onclick="resetPin('${esc(n)}')">🔓</span>`:'';
    const need=roomCreated && !P.chars[n] ? `<span class="up" onclick="askOnePhoto('${esc(n)}')">📷 ارفع صورة</span>` : '';
    return `<span class="pill"><b>${i+1}</b>${n}${lock}${need}<span class="x" onclick="rmName(${i})">×</span></span>`;
  }).join("");

  let photoBlock = !roomCreated ? `
    <div class="card">
      <p class="label"><span class="dot"></span> الصور (بالضبط ${needCount||'—'} صورة)</p>
      <p class="hint">اختر من ألبومك بعدد اللاعبين بالضبط. ${readyPool().length}/${needCount||0} جاهزة.</p>
      <button class="photo-btn" ${!needCount?'disabled':''} onclick="pickPhotos()">📷 اختر الصور من الألبوم</button>
      <div class="thumbs">${pool.map((p,i)=>`
        <div class="thumb">${p.preview?`<img src="${p.preview}">`:''}
          ${p.status==='uploading'?'<div class="st">⏳</div>':''}
          ${p.status==='error'?'<div class="st">⚠️</div>':''}
          <div class="rm" onclick="rmPhoto(${i})">×</div>
        </div>`).join("")}</div>
    </div>` : "";

  let assignBtn = (!roomCreated && needCount>=MINP && readyPool().length===needCount) ?
    `<button class="go" onclick="createRoom()">🎲 وزّع الصور وأنشئ الغرفة</button>` : "";

  let liveBlock = roomCreated ? `
    <div class="card">
      <p class="label"><span class="dot"></span> التوزيع الحالي ${'(إنت المُعِد — ما تلعب، عادي تشوف كل شي)'}</p>
      <div class="pgrid">${P.players.map(n=>{const c=P.chars[n];return c?`<div class="pcard"><img src="${c.url}"><div class="pn">${n}</div></div>`:`<div class="pcard empty">${n}<br>بانتظار صورة</div>`;}).join("")}</div>
      <button class="go sec" onclick="reshuffleSame()">🔄 نفس الصور — توزيع جديد</button>
      <button class="go sec" style="margin-top:10px;color:#ffb3c0" onclick="freshPhotos()">🗑️ ابدأ بصور جديدة (نفس الرابط)</button>
    </div>
    <div class="card">
      <p class="label"><span class="dot"></span> رابط الغرفة (ثابت — أرسله مرة وحدة)</p>
      <p class="hint">الصور تُخزَّن مؤقتاً وتنتهي صلاحيتها بعد ٣ ساعات من رفعها — لو تأخرتوا أكثر، ارفعوا الصور من جديد.</p>
      <div class="linkbox">${shareLink(roomCode)}</div>
      <button class="go" onclick="cpMsg('${roomCode}')">📋 نسخ رسالة جاهزة للديسكورد</button>
      <button class="go sec" style="margin-top:10px" onclick="cp('${shareLink(roomCode)}')">📋 نسخ الرابط فقط</button>
    </div>` : "";

  $('hostView').innerHTML=`
    <div class="brand">
      <span class="mark" dir="ltr">ethical</span>
      <h1>فوق الراس</h1>
    </div>
    <div class="card">
      <p class="label"><span class="dot"></span> اللاعبون (من ${MINP} إلى ${MAXP})</p>
      <div class="name-input">
        <input id="nameInput" placeholder="اكتب الاسم واضغط +" maxlength="20" onkeydown="if(event.key==='Enter')addName()">
        <button class="add-btn" onclick="addName()">+</button>
      </div>
      <div class="pills">${pills}</div>
      ${P.players.length<MINP?`<div class="empty">ضيف ${MINP-P.players.length} لاعب على الأقل.</div>`:''}
      ${P.players.length>=MAXP?`<div class="empty">وصلت الحد الأقصى (${MAXP} لاعبين).</div>`:''}
    </div>
    ${photoBlock}
    ${assignBtn}
    ${liveBlock}
    <div class="card" style="margin-top:18px">
      <p class="label"><span class="dot"></span> كيف تلعب</p>
      <ol class="steps">
        <li>اكتب أسماء اللاعبين (٢ إلى ٤).</li>
        <li>ارفع صورة لكل لاعب من ألبومك (نفس العدد بالضبط).</li>
        <li>اضغط "وزّع الصور" — تتوزع عشوائياً وتُنشأ الغرفة.</li>
        <li>أرسل الرابط الثابت؛ كل لاعب يختار اسمه ويحط رمز سري ٤ أرقام.</li>
        <li>يشوف صور الباقين فوق رؤوسهم، ويسأل أسئلة يحاول يعرف صورته هو.</li>
        <li>لما يعرفها يضغط "خمّنتها" وتنكشف له 🎉</li>
      </ol>
    </div>`;
}

function addName(){
  const inp=$('nameInput');const v=(inp.value||'').trim();if(!v)return;
  if(P.players.length>=MAXP){toast('الحد الأقصى '+MAXP+' لاعبين');return;}
  if(P.players.includes(v)){toast('الاسم مكرر');return;}
  P.players.push(v);
  inp.value="";renderHost();$('nameInput').focus();
  if(roomCreated)pushSoon();
}
function rmName(i){
  const n=P.players[i];P.players.splice(i,1);
  delete P.chars[n]; delete P.pins[n];
  renderHost();if(roomCreated)pushSoon();
}
function resetPin(name){delete P.pins[name];pushSoon();renderHost();toast('تم مسح رمز '+name);}

function pickPhotos(){ $('fileInput').value=""; $('fileInput').click(); }
$('fileInput').addEventListener('change', async (e)=>{
  const need=P.players.length - readyPool().length;
  const files=Array.from(e.target.files||[]).slice(0, Math.max(0,need));
  if(!files.length){ if(e.target.files.length) toast('ما تحتاج صور أكثر'); return; }
  for(const f of files){
    const idx=pool.length;
    const preview=URL.createObjectURL(f);
    pool.push({status:'uploading',preview,url:null});
    renderHost();
    try{
      const blob=await compressImage(f);
      const url=await uploadImage(blob,roomCode,idx);
      if(!url) throw new Error('no url');
      pool[idx].status='done'; pool[idx].url=url;
    }catch(err){ pool[idx].status='error'; toast('فشل رفع صورة'); }
    renderHost();
  }
});
function rmPhoto(i){ pool.splice(i,1); renderHost(); }

function assignAllRandom(){
  const ready=readyPool();
  if(ready.length!==P.players.length){toast('لازم عدد الصور = عدد اللاعبين');return false;}
  const picks=shuffle(ready.map(p=>p.url));
  P.chars={};
  P.players.forEach((n,i)=>P.chars[n]={url:picks[i]});
  P.v=(P.v||0)+1;
  return true;
}
function createRoom(){
  if(P.players.length<MINP){toast('ضيف '+MINP+' لاعبين على الأقل');return;}
  if(!assignAllRandom())return;
  roomCreated=true;
  location.hash='host='+roomCode;
  pushTo(roomCode,P);
  renderHost();
  toast('تم إنشاء الغرفة ✅');
}
function reshuffleSame(){
  const ready=readyPool();
  if(ready.length!==P.players.length){toast('فيه لاعب بدون صورة');return;}
  assignAllRandom();
  pushTo(roomCode,P);
  renderHost();
  toast('توزيع جديد 🔄');
}
function freshPhotos(){
  pool=[]; P.chars={};
  renderHost();
  toast('احذف الرصيد القديم — ارفع صور جديدة تحت');
}
function askOnePhoto(name){
  pendingUploadFor=name;
  $('fileInputOne').value="";
  $('fileInputOne').click();
}
$('fileInputOne').addEventListener('change', async (e)=>{
  const f=(e.target.files||[])[0];
  if(!f||!pendingUploadFor)return;
  const name=pendingUploadFor;
  toast('جارٍ رفع صورة '+name+'…');
  try{
    const blob=await compressImage(f);
    const url=await uploadImage(blob, roomCode, 'x'+Date.now());
    if(!url) throw new Error('no url');
    P.chars[name]={url};
    pool.push({status:'done',preview:URL.createObjectURL(f),url});
    pushTo(roomCode,P);
    renderHost();
    toast('تمت إضافة صورة '+name+' ✓');
  }catch(err){ toast('فشل رفع الصورة'); }
  pendingUploadFor=null;
});

async function resumeHost(code){roomCode=code;roomCreated=true;const s=await pullFrom(code);if(s)P=Object.assign(P,s);renderHost();}
function cp(t){navigator.clipboard.writeText(t).then(()=>toast('تم نسخ الرابط ✓'));}
function cpMsg(code){const link=shareLink(code);const msg=`🎭 لعبة فوق الراس — ethical\nافتحوا الرابط واختاروا أسماءكم 👇\n${link}`;navigator.clipboard.writeText(msg).then(()=>toast('تم نسخ الرسالة ✓'));}

/* ============ PLAYER ============ */
let G=null, picked=null, verified=false, pinStage=null, selfGuessed=false, lastV=-1, pollT=null, playerCode=null;

async function playerInit(code){
  playerCode=code;
  $('hostView').style.display='none';
  $('roleView').style.display='flex';
  $('roleView').innerHTML=`<div class="badlink">جارٍ التحميل…</div>`;
  await refresh(true);
  pollT=setInterval(()=>refresh(false),6000);
}
async function refresh(first){
  const s=await pullFrom(playerCode);
  if(!s){ if(first)$('roleView').innerHTML=`<div class="badlink">بانتظار الهوست… تأكد إنه أنشأ الغرفة.<br><br><button class="go" style="max-width:240px" onclick="refresh(true)">🔄 تحديث</button></div>`; return; }
  if(pinStage){ G=s; lastV=s.v; return; }
  const newRoundFlag=(s.v!==lastV);
  G=s; lastV=s.v;
  if(picked && !G.players.includes(picked)){ verified=false; renderBoard(true); return; }
  if(picked && verified){
    if(newRoundFlag){ selfGuessed=false; toast('🔄 توزيع جديد — دورك يبدأ من جديد'); }
    renderBoard(false);
  } else renderPicker();
}
function renderPicker(){
  $('roleView').innerHTML=`
    <div class="pick-title">اختر اسمك</div>
    <div class="pick-sub">اضغط على اسمك، وحط رمزك السري عشان تدخل اللوحة</div>
    <div class="names-grid">${G.players.map(n=>`<button class="name-btn" onclick="choose('${esc(n)}')">${n}${G.pins&&G.pins[n]?' 🔒':''}</button>`).join("")}</div>
    <div class="ctl"><button class="upd" onclick="refresh(false)">🔄 تحديث</button></div>`;
}
function choose(n){
  picked=n; verified=false; selfGuessed=false;
  const existing=G.pins&&G.pins[n];
  if(existing){ pinStage='enter'; renderPinEnter(); } else { pinStage='set'; renderPinSet(); }
}
function renderPinSet(){
  $('roleView').innerHTML=`
    <div class="pick-title">رمزك السري</div>
    <div class="pick-sub">يا ${picked}، حط رمز ٤ أرقام تتذكره — يمنع أي أحد يفتح اسمك.</div>
    <div style="width:min(320px,90vw)">
      <input class="pin" id="p1" type="tel" inputmode="numeric" maxlength="4" placeholder="٤ أرقام">
      <div class="pinerr" id="perr"></div>
      <button class="go" onclick="submitSetPin()">حفظ الرمز</button>
    </div>
    <div class="ctl"><button onclick="picked=null;pinStage=null;renderPicker()">↩︎ رجوع</button></div>`;
}
function renderPinEnter(){
  $('roleView').innerHTML=`
    <div class="pick-title">رمز ${picked} 🔒</div>
    <div class="pick-sub">اكتب رمزك السري عشان تدخل اللوحة.</div>
    <div style="width:min(320px,90vw)">
      <input class="pin" id="p1" type="tel" inputmode="numeric" maxlength="4" placeholder="٤ أرقام">
      <div class="pinerr" id="perr"></div>
      <button class="go" onclick="submitEnterPin()">دخول</button>
    </div>
    <div class="pick-sub" style="margin-top:14px;font-size:12px">نسيت رمزك؟ خلّ الهوست يضغط 🔓 جنب اسمك.</div>
    <div class="ctl"><button onclick="picked=null;pinStage=null;renderPicker()">↩︎ رجوع</button></div>`;
}
async function submitSetPin(){
  const a=toEN($('p1').value), e=$('perr');
  if(!/^\d{4}$/.test(a)){e.textContent='لازم ٤ أرقام';return;}
  const h=pinHash(a,playerCode);
  const latest=(await pullFrom(playerCode))||G; latest.pins=latest.pins||{};
  if(latest.pins[picked] && latest.pins[picked]!==h){ G=latest; pinStage='enter'; renderPinEnter(); $('perr').textContent='الاسم له رمز محطوط مسبقاً — اكتبه'; return; }
  latest.pins[picked]=h; await pushTo(playerCode,latest); G=latest;
  const nm=picked; picked=null; pinStage=null; verified=false; renderPicker();
  toast('تم حفظ رمز '+nm+' — اختر اسمك وادخل بالرمز');
}
function submitEnterPin(){
  const a=toEN($('p1').value), e=$('perr');
  if(!/^\d{4}$/.test(a)){e.textContent='لازم ٤ أرقام';return;}
  const h=pinHash(a,playerCode);
  if(G.pins && G.pins[picked]===h){ verified=true; pinStage=null; selfGuessed=false; renderBoard(false); }
  else e.textContent='الرمز غير صحيح';
}
function renderBoard(removed){
  const stage=$('roleView');
  if(removed){
    stage.innerHTML=`<div class="pick-title">يا ${picked} 👋</div>
      <div class="pick-sub">الهوست شالك من اللعبة أو غيّر الأسماء.</div>
      <div class="ctl"><button class="upd" onclick="refresh(false)">🔄 تحديث</button>
      <button onclick="picked=null;verified=false;renderPicker()">↩︎ اختر اسم</button></div>`;
    return;
  }
  const cards=G.players.map(n=>{
    const c=G.chars[n];
    if(!c) return `<div class="bcard"><div class="mask" style="background:var(--surface2);border-radius:14px;aspect-ratio:1;display:flex;align-items:center;justify-content:center">⏳</div><div class="bn">${n}</div></div>`;
    if(n===picked){
      if(selfGuessed) return `<div class="bcard won"><img src="${c.url}"><div class="bn">🎉 ${n} (انت)</div></div>`;
      return `<div class="bcard me"><div class="mask">❓</div><div class="bn">${n} (انت)</div><button class="guess-btn" onclick="doGuess()">✅ خمّنتها!</button></div>`;
    }
    return `<div class="bcard"><img src="${c.url}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="mask" style="display:none;background:var(--surface2);border-radius:14px;aspect-ratio:1;align-items:center;justify-content:center;font-size:13px;color:var(--muted);padding:6px;text-align:center">انتهت صلاحية الصورة</div><div class="bn">${n}</div></div>`;
  }).join("");
  stage.innerHTML=`
    <div class="board-title">لوحة الصور</div>
    <div class="board-sub">تقدر تشوف صور الباقين، بس مب صورتك. اسأل أسئلة (نعم/لا) عن نفسك عشان تعرفها.</div>
    <div class="board" id="board">${cards}</div>
    <div class="ctl"><button class="upd" onclick="refresh(false)">🔄 تحديث</button>
    <button onclick="picked=null;verified=false;selfGuessed=false;renderPicker()">↩︎ مب أنا</button></div>`;
}
function doGuess(){selfGuessed=true;renderBoard(false);const b=$('board');if(b){b.classList.remove('flash');void b.offsetWidth;b.classList.add('flash');}}

/* ============ particles + routing ============ */
(function(){const p=$('particles');for(let i=0;i<14;i++){const s=document.createElement('span');s.style.left=Math.random()*100+'%';s.style.animationDuration=(8+Math.random()*10)+'s';s.style.animationDelay=(-Math.random()*12)+'s';s.style.opacity=(.15+Math.random()*.35);p.appendChild(s);}})();

const hRoom=location.hash.match(/room=([a-z0-9]+)/i);
const hHost=location.hash.match(/host=([a-z0-9]+)/i);
if(hRoom){ playerInit(hRoom[1]); }
else if(hHost){ resumeHost(hHost[1]); }
else { renderHost(); }
</script>
</body>
</html>
